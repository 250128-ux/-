<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... ваши стили ... */
        .auth-form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .auth-form input {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Форма входа -->
    <div id="auth-section" class="auth-form">
        <h2>Вход в систему</h2>
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Пароль" />
        <button id="login-btn">Войти</button>
        <div id="auth-message"></div>
    </div>

    <!-- Основной контент (скрыт до входа) -->
    <div id="main-content" class="hidden">
        <h1>👥 Статусы команды</h1>
        <div id="user-list">Загрузка...</div>

        <div class="controls">
            <h3>✏️ Изменить мой статус</h3>
            <input type="text" id="new-status" placeholder="Введите новый статус" />
            <button id="update-btn">Обновить</button>
            <div id="message"></div>
        </div>
        <button id="logout-btn" style="margin-top: 20px; background: #ef4444;">Выйти</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://nnctnlrmpbhbdpenusod.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6km0M68Q-1IQohr2b7tX9w_kIfzMTJS';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUserId = null;

        // Проверка сессии при загрузке
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session?.user) {
                currentUserId = session.user.id;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                await loadProfiles();
                console.log('✅ Авторизован как:', currentUserId);
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        }

        // Вход
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('auth-message');
            
            if (!email || !password) {
                msg.textContent = '❌ Введите email и пароль';
                return;
            }

            msg.textContent = '⏳ Входим...';
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email, password
            });

            if (error) {
                msg.textContent = `❌ Ошибка: ${error.message}`;
            } else {
                msg.textContent = '✅ Успешно!';
                await checkSession();
            }
        }

        // Выход
        async function logout() {
            await supabase.auth.signOut();
            currentUserId = null;
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // Загрузка профилей
        async function loadProfiles() {
            const listDiv = document.getElementById('user-list');
            listDiv.innerHTML = 'Загрузка...';

            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                listDiv.innerHTML = `<div class="error">Ошибка: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                listDiv.innerHTML = '<div>Нет данных. Добавьте запись в таблицу.</div>';
                return;
            }

            listDiv.innerHTML = '';
            data.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';
                if (user.id === currentUserId) {
                    card.style.border = '2px solid #3b82f6';
                }
                card.innerHTML = `
                    <div class="user-name">${user.username || 'Без имени'} ${user.id === currentUserId ? '(ВЫ)' : ''}</div>
                    <div class="user-status">Статус: ${user.status || 'Нет статуса'}</div>
                    <div style="font-size: 12px; color: #999; margin-top: 8px;">ID: ${user.id}</div>
                `;
                listDiv.appendChild(card);
            });
        }

        // Обновление статуса
        async function updateStatus() {
            const newStatus = document.getElementById('new-status').value;
            const msgBox = document.getElementById('message');
            
            if (!currentUserId) {
                msgBox.textContent = '❌ Вы не авторизованы!';
                msgBox.className = 'error';
                return;
            }

            if (!newStatus) {
                msgBox.textContent = '❌ Введите статус!';
                msgBox.className = 'error';
                return;
            }

            msgBox.textContent = '⏳ Обновляем...';
            msgBox.className = '';

            const { data, error } = await supabase
                .from('profiles')
                .update({ status: newStatus })
                .eq('id', currentUserId)  // Используем ID авторизованного пользователя
                .select();

            if (error) {
                msgBox.textContent = `❌ Ошибка: ${error.message}`;
                msgBox.className = 'error';
            } else {
                msgBox.textContent = `✅ Статус обновлён на "${newStatus}"!`;
                msgBox.className = 'success';
                document.getElementById('new-status').value = '';
                await loadProfiles();
            }
        }

        // Привязка событий
        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            document.getElementById('login-btn').addEventListener('click', login);
            document.getElementById('logout-btn').addEventListener('click', logout);
            document.getElementById('update-btn').addEventListener('click', updateStatus);
        });
    </script>
</body>
</html>
